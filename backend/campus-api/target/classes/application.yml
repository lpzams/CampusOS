server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: campus-portal
  # ===== 数据源：改成你自己的库名 / 账号 / 密码 =====
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  # ===== Redis：项目里认证、缓存会用到，本机默认配置 =====
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

# ===== MyBatis-Plus =====
mybatis-plus:
  # Mapper XML 位置（本示例用注解/Wrapper，暂无 XML，保留给复杂 SQL 用）
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    # 下划线列名 -> 驼峰字段名，自动映射
    map-underscore-to-camel-case: true
    # 开发期打印 SQL，方便调试；上线可去掉
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 全局主键策略：数据库自增
      id-type: auto
      # 逻辑删除字段（对应 PO 里 @TableLogic 的 deleted）
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ===== 日志 =====
logging:
  level:
    com.campus: debug
