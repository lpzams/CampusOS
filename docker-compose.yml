# ============================================================
# CampusOS 统一开发环境 —— 一条命令拉起 MySQL + Redis
#
# 用法（装好 Docker Desktop 后，在项目根目录执行）：
#   docker compose up -d      启动。首次启动会自动按文件名顺序执行
#                             docs/sql/ 下的全部脚本（建库建表 + 示例数据）
#   docker compose down       停止（数据保留在 mysql-data 卷里，不丢）
#   docker compose down -v    停止并清空数据。想重建数据库/让新加的
#                             SQL 脚本生效时用它，再 up -d 即可
#   docker compose ps         看运行状态
#   docker logs campus-mysql  看 MySQL 日志（建表报错在这里找）
#
# 注意：SQL 脚本只在「数据卷为空的首次启动」时执行，日常重启不会重复建表。
# 后端/前端照常在 IDEA / VS Code 里跑，连 localhost:3306 / localhost:6379 即可，
# 与 backend 的 application.yml 默认配置完全对应，无需改任何代码。
# ============================================================
name: campusos

services:
  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    restart: unless-stopped
    environment:
      # 账号密码与 backend/campus-api/src/main/resources/application.yml 保持一致（root/root）
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Shanghai
    command:
      # 统一字符集与时区，保证三台电脑上中文和时间的行为完全一致
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-time-zone=+08:00
    ports:
      # 本机已经装了 MySQL 占用 3306 的话：把左边改成 13306，
      # 并把 application.yml 的连接地址改成 localhost:13306（或卸载/停掉本机 MySQL）
      - "3306:3306"
    volumes:
      # 数据落在命名卷里，容器删了数据也在；docker compose down -v 才会清掉
      - mysql-data:/var/lib/mysql
      # 初始化脚本目录：首次启动按文件名字母序执行（001_init.sql -> 002_xxx.sql -> ...）
      - ./docs/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-hlocalhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    # 认证/缓存模块会用到（application.yml 已按 localhost:6379 无密码配置）
    image: redis:7-alpine
    container_name: campus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql-data:
