# ============================================================
# CampusOS 一键环境 —— MySQL + Redis + 后端 + 网站，一条命令全跑起来
#
# 【一键全套】（装好 Docker Desktop 后，在项目根目录执行）
#   docker compose up -d --build
#   等构建完成后访问：
#     网站      http://localhost:8081        （nginx 已把 /api 反代给后端）
#     后端接口   http://localhost:8080/api/news
#   改了代码想更新容器：还是这条命令（没改的部分走缓存，很快）
#
# 【只要数据库】（自己在 IDEA / VS Code 里跑后端前端时）
#   docker compose up -d mysql redis
#   注意：容器后端占 8080、容器网站占 8081，和本机 IDEA 跑的后端会端口
#   冲突，二选一（docker compose stop backend web 可以只停这两个）。
#
# 【其它常用】
#   docker compose ps          看状态          docker compose down     全部停止（数据保留）
#   docker compose down -v     停止并清空数据库（下次启动重新执行 docs/sql 全部脚本）
#   docker logs -f campus-backend   看后端日志（mysql / web 同理）
#
# 注意：docs/sql 的脚本只在「数据卷为空的首次启动」时执行，日常重启不会重复建表。
# 端口和本机其它项目冲突时：新建 docker-compose.override.yml 改端口映射
# （compose 会自动叠加、已被 .gitignore），不要改这份大家共享的文件。
# ============================================================
name: campusos

services:
  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    restart: unless-stopped
    environment:
      # 账号密码与 backend/campus-api/src/main/resources/application.yml 保持一致（root/root）
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Shanghai
    command:
      # 统一字符集与时区，保证每台电脑上中文和时间的行为完全一致
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-time-zone=+08:00
    ports:
      # 本机已经装了 MySQL 占用 3306 的话：把左边改成 13306，
      # 并把 application.yml 的连接地址改成 localhost:13306（或停掉本机 MySQL）
      - "3306:3306"
    volumes:
      # 数据落在命名卷里，容器删了数据也在；docker compose down -v 才会清掉
      - mysql-data:/var/lib/mysql
      # 初始化脚本目录：首次启动按文件名字母序执行（001_init.sql -> 002_xxx.sql -> ...）
      - ./docs/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-hlocalhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    # 认证/缓存模块会用到（application.yml 已按 localhost:6379 无密码配置）
    image: redis:7-alpine
    container_name: campus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    # 用 backend/Dockerfile 构建：Maven 打包 -> JRE 运行，详见该文件注释
    build: ./backend
    container_name: campus-backend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      # 容器之间用服务名互访（mysql/redis），这里用环境变量覆盖 application.yml
      # 里的 localhost —— 这就是"配置外置"，代码一行不用改
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/campus_os?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATA_REDIS_HOST: redis
      ANTHROPIC_BASE_URL: "${ANTHROPIC_BASE_URL:-}"
      ANTHROPIC_AUTH_TOKEN: "${ANTHROPIC_AUTH_TOKEN:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-opus-4-8}"
    ports:
      - "8080:8080"
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      # 等 MySQL 完全就绪（healthcheck 通过）再启动后端，避免起太快连不上库
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    # 用 web/Dockerfile 构建：npm build -> nginx 托管 + /api 反代给 backend
    build: ./web
    container_name: campus-web
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  uploads-data:
