# 网站端容器里的 nginx 配置（只在 Docker 部署时使用，见 web/Dockerfile）。
# 作用等同开发时 vite.config.ts 里的 server.proxy：前端页面和后端接口同源，免跨域。
server {
    listen 80;
    server_name _;

    # 前端静态文件。try_files 最后回退到 index.html：
    # 这是 SPA history 路由的标配，否则直接访问/刷新 /news/1 这类地址会 404。
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # /api 开头的请求转发给后端。
    # backend 是 docker-compose.yml 里的服务名，容器网络内部可直接当域名解析。
    location /api {
        proxy_pass http://backend:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
